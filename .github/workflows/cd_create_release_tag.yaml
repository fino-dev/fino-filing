# base_tag（既存の安定版タグ）+ bump → 次の vX.Y.Z を計算し、apply でタグ作成・push

name: CD - Create Release Tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump Version Level"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  plan:
    name: Preview next tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.preview.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve base and compute next tag
        id: preview
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0)

          # v1.2.3 → 1.2.3 にする
          VERSION=${PREV_TAG#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "$BUMP" in
            major)
              ((MAJOR++))
              MINOR=0
              PATCH=0
              ;;
            minor)
              ((MINOR++))
              PATCH=0
              ;;
            patch)
              ((PATCH++))
              ;;
            *)
              echo "Invalid bump type"
              exit 1
              ;;
          esac

          NEXT_TAG="v$MAJOR.$MINOR.$PATCH"

          echo "tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          echo "🚀 new tag generated: $NEXT_TAG" >> "$GITHUB_STEP_SUMMARY"

  apply:
    name: Push release tag
    needs: plan
    runs-on: ubuntu-latest
    environment: create-release-tag
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create annotated tag and push
        env:
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail
          t="${TAG#refs/tags/}"
          t="${t#/}"
          [[ -n "$t" ]] || { echo "tag が空です"; exit 1; }
          if git rev-parse -q --verify "refs/tags/${t}" >/dev/null; then
            echo "既に存在: ${t}"; exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$t" -m "Release $t"
          git push origin "refs/tags/$t"
