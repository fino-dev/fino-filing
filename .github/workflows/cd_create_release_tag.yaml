name: CD - Create Release Tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "セマンティックバージョンのどの桁を上げるか（次のタグ名は既存タグから自動計算）"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.next.outputs.tag }}
    steps:
      - name: Check out source repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next release tag
        id: next
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          python3 <<'PY'
          import os
          import re
          import subprocess
          import sys

          bump = os.environ["BUMP"]
          if bump not in {"major", "minor", "patch"}:
              print(f"無効な bump: {bump}", file=sys.stderr)
              sys.exit(1)

          tags_out = subprocess.check_output(["git", "tag", "-l"], text=True)
          tags = [t.strip() for t in tags_out.splitlines() if t.strip()]
          stable = re.compile(r"^v?(\d+)\.(\d+)\.(\d+)$")

          tuples: list[tuple[int, int, int]] = []
          for t in tags:
              m = stable.fullmatch(t)
              if m:
                  tuples.append(tuple(int(x) for x in m.groups()))

          if tuples:
              maj, mino, pat = max(tuples)
          else:
              maj, mino, pat = 0, 0, 0

          if bump == "major":
              maj += 1
              mino = 0
              pat = 0
          elif bump == "minor":
              mino += 1
              pat = 0
          else:
              pat += 1

          new_tag = f"v{maj}.{mino}.{pat}"
          gh_out = os.environ["GITHUB_OUTPUT"]
          with open(gh_out, "a", encoding="utf-8") as f:
              f.write(f"tag={new_tag}\n")
          print(f"次のタグ: {new_tag} (bump={bump})")
          PY

      - name: Summarize tag plan for review
        env:
          TAG: ${{ steps.next.outputs.tag }}
          BUMP: ${{ inputs.bump }}
        run: |
          {
            echo "## リリースタグ案（確認）"
            echo ""
            echo "| 項目 | 値 |"
            echo "|------|-----|"
            echo "| 付与予定タグ | \`${TAG}\` |"
            echo "| bump | \`${BUMP}\` |"
            echo ""
            echo "内容を確認し、問題なければ **この実行の続きのジョブ**（\`apply\`）を進行させてください。"
            echo ""
            echo "リポジトリの **Settings → Environments → \`create-release-tag\`** で *Required reviewers* を有効にすると、タグ作成前に承認フローで止められます（未設定の場合は \`plan\` 直後に \`apply\` が続行されます）。"
          } >> "$GITHUB_STEP_SUMMARY"

  apply:
    needs: plan
    runs-on: ubuntu-latest
    environment: create-release-tag
    permissions:
      contents: write
    steps:
      - name: Check out source repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push tag
        env:
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail
          tag="${TAG#refs/tags/}"
          tag="${tag#/}"
          if [[ -z "$tag" ]]; then
            echo "tag が空です"; exit 1
          fi
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "タグは既に存在します: ${tag}"; exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "refs/tags/$tag"
